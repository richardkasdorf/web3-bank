
services:
  # Keys (Vault)
  vault:
    image: hashicorp/vault:latest
    container_name: bank_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root_token_estudo" # Token para seu FastAPI se autenticar
      VAULT_ADDR: "http://0.0.0"
    cap_add:
      - IPC_LOCK # Necessário para o Vault rodar com segurança

  # Bank (FastAPI)
  api:
    build: .
    container_name: bank_api
    ports:
      - "8000:8000"
    depends_on:
      - vault
    environment:
      - VAULT_URL=http://vault:8200
      - VAULT_TOKEN=root_token_estudo
      - DATABASE_URL=sqlite:///./sql_app.db # Exemplo de DB
    volumes:
      - .:/app
    env_file:
      - .env

  